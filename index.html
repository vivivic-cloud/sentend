<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>sentend</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 24px 60px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .card {
      width: 100%;
      max-width: 390px;
      border: 1px solid #111;
      border-radius: 16px;
      padding: 24px;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* 자막 영역 */
    .subtitle-area {
      min-height: 200px;
      font-size: 17px;
      line-height: 1.85;
      color: #ddd;
      word-break: keep-all;
    }

    .subtitle-area.empty::after {
      content: '음성을 올리면 자막이 생성됩니다';
      color: #ccc;
    }

    .word {
      display: inline;
      border-radius: 3px;
      padding: 0 1px;
      transition: color 0.08s;
    }
    .word.done   { color: #111; }
    .word.active { color: #111; background: #f0f0f0; }

    .divider { height: 1px; background: #eee; }

    /* 오디오 플레이어 */
    .player-wrap {
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    .player-wrap.visible { display: flex; }
    audio { width: 100%; outline: none; }

    /* 업로드 버튼 */
    .upload-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: #888;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: all 0.15s;
    }
    .upload-btn:active { border-color: #111; color: #111; }

    .remove-btn {
      background: none;
      border: none;
      font-size: 12px;
      color: #bbb;
      cursor: pointer;
      padding: 0;
      text-align: left;
    }

    .status {
      font-size: 13px;
      color: #aaa;
      text-align: center;
      min-height: 18px;
    }
    .pulse { animation: pulse 1s ease-in-out infinite; display: inline-block; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* API 키 */
    .key-row { display: flex; gap: 8px; }
    .key-input {
      flex: 1;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: #111;
      outline: none;
    }
    .key-input::placeholder { color: #ccc; }
    .key-save-btn {
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .key-label { font-size: 11px; color: #bbb; margin-bottom: 6px; }
    .key-saved { font-size: 11px; color: #bbb; margin-top: 4px; }

    #file-input { display: none; }
  </style>
</head>
<body>
<div class="card">

  <!-- 자막 -->
  <div class="subtitle-area empty" id="subtitle"></div>

  <div class="divider"></div>

  <!-- 업로드 -->
  <button class="upload-btn" onclick="document.getElementById('file-input').click()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M8 1v9M5 4l3-3 3 3" stroke="#aaa" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="#aaa" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    음성 파일 올리기
  </button>

  <div class="player-wrap" id="player-wrap">
    <audio id="audio" controls></audio>
    <button class="remove-btn" onclick="removeAudio()">삭제</button>
  </div>

  <div class="status" id="status"></div>

  <div class="divider"></div>

  <!-- API 키 -->
  <div>
    <div class="key-label">Groq API Key</div>
    <div class="key-row">
      <input class="key-input" id="key-input" type="password" placeholder="gsk_..." />
      <button class="key-save-btn" onclick="saveKey()">저장</button>
    </div>
    <div class="key-saved" id="key-saved"></div>
  </div>

</div>

<input type="file" id="file-input" accept="audio/*" onchange="loadAudio(event)" />

<script>
  let GROQ_KEY = localStorage.getItem('groq_key') || '';
  let audioFile = null;
  let wordTimings = [];
  let lastActiveIdx = -1;

  // 키 불러오기
  if (GROQ_KEY) {
    document.getElementById('key-input').value = GROQ_KEY;
    document.getElementById('key-saved').textContent = '저장됨 ✓';
  }

  function saveKey() {
    const v = document.getElementById('key-input').value.trim();
    if (!v) return;
    GROQ_KEY = v;
    localStorage.setItem('groq_key', v);
    document.getElementById('key-saved').textContent = '저장됨 ✓';
  }

  // ── 파일 로드 & 자동 분석 ─────────────────────────
  async function loadAudio(e) {
    audioFile = e.target.files[0];
    if (!audioFile) return;

    GROQ_KEY = localStorage.getItem('groq_key') || document.getElementById('key-input').value.trim();
    if (!GROQ_KEY) { alert('Groq API 키를 먼저 저장해주세요.'); return; }

    // 플레이어 세팅
    const url = URL.createObjectURL(audioFile);
    document.getElementById('audio').src = url;
    document.getElementById('player-wrap').classList.add('visible');

    // 자막 리셋
    const subtitle = document.getElementById('subtitle');
    subtitle.innerHTML = '';
    subtitle.classList.add('empty');
    wordTimings = [];
    lastActiveIdx = -1;

    // 자동 분석
    await analyze();
  }

  function removeAudio() {
    const audio = document.getElementById('audio');
    URL.revokeObjectURL(audio.src);
    audio.src = '';
    audio.ontimeupdate = null;
    audioFile = null;
    document.getElementById('player-wrap').classList.remove('visible');
    document.getElementById('file-input').value = '';
    document.getElementById('status').textContent = '';
    const subtitle = document.getElementById('subtitle');
    subtitle.innerHTML = '';
    subtitle.classList.add('empty');
    wordTimings = [];
    lastActiveIdx = -1;
  }

  // ── Groq 분석 ─────────────────────────────────────
  async function analyze() {
    const status = document.getElementById('status');
    status.innerHTML = '<span class="pulse">● 분석 중...</span>';

    try {
      const formData = new FormData();
      formData.append('file', audioFile);
      formData.append('model', 'whisper-large-v3');
      formData.append('response_format', 'verbose_json');
      formData.append('timestamp_granularities[]', 'word');
      formData.append('language', 'ja');

      const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
        method: 'POST',
        headers: { Authorization: `Bearer ${GROQ_KEY}` },
        body: formData,
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || '오류');
      }

      const data = await res.json();
      const words = data.words || [];
      if (!words.length) throw new Error('단어를 인식하지 못했습니다.');

      renderSubtitle(words);
      status.textContent = '';

    } catch (err) {
      status.textContent = '오류: ' + err.message;
    }
  }

  // ── 자막 렌더링 ───────────────────────────────────
  function renderSubtitle(words) {
    const subtitle = document.getElementById('subtitle');
    subtitle.classList.remove('empty');

    wordTimings = [];
    let html = '';

    words.forEach((w, i) => {
      const id = `w${i}`;
      wordTimings.push({ start: w.start, end: w.end, id });
      // 단어 앞 공백 (일본어는 공백 없이, 영어는 공백)
      const space = i > 0 ? ' ' : '';
      html += `${space}<span class="word" id="${id}">${escHtml(w.word)}</span>`;
    });

    subtitle.innerHTML = html;

    const audio = document.getElementById('audio');
    audio.ontimeupdate = () => updateHighlight(audio.currentTime);
  }

  // ── 하이라이트 ────────────────────────────────────
  function updateHighlight(t) {
    let lo = 0, hi = wordTimings.length - 1, cur = -1;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (wordTimings[mid].end <= t) lo = mid + 1;
      else if (wordTimings[mid].start > t) hi = mid - 1;
      else { cur = mid; break; }
    }

    if (cur === lastActiveIdx) return;

    if (lastActiveIdx >= 0) {
      const prev = document.getElementById(wordTimings[lastActiveIdx].id);
      if (prev) { prev.classList.remove('active'); prev.classList.add('done'); }
    }
    if (cur > lastActiveIdx + 1) {
      for (let i = Math.max(0, lastActiveIdx + 1); i < cur; i++) {
        const el = document.getElementById(wordTimings[i].id);
        if (el) { el.classList.remove('active'); el.classList.add('done'); }
      }
    }
    if (cur >= 0) {
      const el = document.getElementById(wordTimings[cur].id);
      if (el) { el.classList.add('active'); el.classList.remove('done'); el.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
    }
    lastActiveIdx = cur;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
