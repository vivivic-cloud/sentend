<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>sentend</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .card {
      width: 100%;
      max-width: 390px;
      border: 1px solid #111111;
      border-radius: 16px;
      padding: 24px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      border: none;
      outline: none;
      resize: none;
      font-size: 17px;
      line-height: 1.7;
      color: #111111;
      background: transparent;
      caret-color: #111111;
    }

    textarea::placeholder {
      color: #cccccc;
    }

    .divider {
      height: 1px;
      background: #eeeeee;
    }

    .audio-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .upload-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1px solid #dddddd;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: #888888;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: border-color 0.15s, color 0.15s;
    }

    .upload-btn:active {
      border-color: #111111;
      color: #111111;
    }

    .upload-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .audio-player {
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    .audio-player.visible {
      display: flex;
    }

    audio {
      width: 100%;
      height: 36px;
      outline: none;
    }

    .remove-btn {
      background: none;
      border: none;
      font-size: 12px;
      color: #bbbbbb;
      cursor: pointer;
      text-align: left;
      padding: 0;
    }

    /* 상태 메시지 */
    .status {
      font-size: 13px;
      color: #aaaaaa;
      display: none;
    }

    .status.visible {
      display: block;
    }

    /* API 키 설정 */
    .key-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .key-input {
      flex: 1;
      border: 1px solid #eeeeee;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: #111111;
      outline: none;
    }

    .key-input::placeholder {
      color: #cccccc;
    }

    .key-save-btn {
      background: #111111;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    .key-label {
      font-size: 11px;
      color: #cccccc;
    }

    #file-input {
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <textarea id="sentence" placeholder="음성을 올리면 문장이 생성됩니다"></textarea>

    <div class="divider"></div>

    <div class="audio-section">
      <button class="upload-btn" id="upload-btn" onclick="document.getElementById('file-input').click()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 1v9M5 4l3-3 3 3" stroke="#aaaaaa" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="#aaaaaa" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        음성 파일 올리기
      </button>

      <div class="status" id="status">분석 중...</div>

      <div class="audio-player" id="audio-player">
        <audio id="audio-el" controls></audio>
        <button class="remove-btn" onclick="removeAudio()">삭제</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- API 키 입력 -->
    <div>
      <div class="key-label" style="margin-bottom:6px;">OpenAI API Key</div>
      <div class="key-row">
        <input class="key-input" id="key-input" type="password" placeholder="sk-..." />
        <button class="key-save-btn" onclick="saveKey()">저장</button>
      </div>
    </div>
  </div>

  <input type="file" id="file-input" accept="audio/*" onchange="loadAudio(event)" />

  <script>
    // 저장된 키 불러오기
    const saved = localStorage.getItem('oai_key');
    if (saved) document.getElementById('key-input').value = saved;

    function saveKey() {
      const key = document.getElementById('key-input').value.trim();
      if (!key) return;
      localStorage.setItem('oai_key', key);
      alert('저장됐습니다.');
    }

    function getKey() {
      return localStorage.getItem('oai_key') || document.getElementById('key-input').value.trim();
    }

    async function loadAudio(e) {
      const file = e.target.files[0];
      if (!file) return;

      const key = getKey();
      if (!key) {
        alert('API 키를 먼저 입력해주세요.');
        return;
      }

      // 플레이어 표시
      const url = URL.createObjectURL(file);
      document.getElementById('audio-el').src = url;
      document.getElementById('audio-player').classList.add('visible');

      // 분석 시작
      const btn = document.getElementById('upload-btn');
      const status = document.getElementById('status');
      btn.disabled = true;
      btn.querySelector('span') && (btn.querySelector('span').textContent = '');
      status.textContent = '분석 중...';
      status.classList.add('visible');

      try {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('model', 'whisper-1');
        formData.append('language', 'ko');

        const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
          method: 'POST',
          headers: { Authorization: `Bearer ${key}` },
          body: formData,
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error?.message || '오류가 발생했습니다.');
        }

        const data = await res.json();
        document.getElementById('sentence').value = data.text;
        status.textContent = '완료';
        setTimeout(() => status.classList.remove('visible'), 1500);
      } catch (err) {
        status.textContent = '오류: ' + err.message;
      } finally {
        btn.disabled = false;
      }
    }

    function removeAudio() {
      const audio = document.getElementById('audio-el');
      URL.revokeObjectURL(audio.src);
      audio.src = '';
      document.getElementById('audio-player').classList.remove('visible');
      document.getElementById('file-input').value = '';
      document.getElementById('status').classList.remove('visible');
    }
  </script>
</body>
</html>
