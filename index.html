<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>sentend</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 24px 60px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .card {
      width: 100%;
      max-width: 390px;
      border: 1px solid #111;
      border-radius: 16px;
      padding: 24px;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      border: none;
      outline: none;
      resize: none;
      font-size: 17px;
      line-height: 1.8;
      color: #111;
      background: transparent;
      caret-color: #111;
    }

    textarea::placeholder { color: #ccc; }

    .divider { height: 1px; background: #eee; }

    .upload-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: #888;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: all 0.15s;
    }

    .upload-btn:active {
      border-color: #111;
      color: #111;
    }

    .player-wrap {
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    .player-wrap.visible { display: flex; }

    audio {
      width: 100%;
      outline: none;
    }

    .remove-btn {
      background: none;
      border: none;
      font-size: 12px;
      color: #bbb;
      cursor: pointer;
      text-align: left;
      padding: 0;
    }

    #file-input { display: none; }
  </style>
</head>
<body>
  <div class="card">

    <textarea placeholder="대본을 입력하세요"></textarea>

    <div class="divider"></div>

    <button class="upload-btn" onclick="document.getElementById('file-input').click()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1v9M5 4l3-3 3 3" stroke="#aaa" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="#aaa" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      음성 파일 올리기
    </button>

    <div class="player-wrap" id="player-wrap">
      <audio id="audio" controls></audio>
      <button class="remove-btn" onclick="removeAudio()">삭제</button>
    </div>

  </div>

  <input type="file" id="file-input" accept="audio/*" onchange="loadAudio(event)" />

  <script>
    function loadAudio(e) {
      const file = e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      document.getElementById('audio').src = url;
      document.getElementById('player-wrap').classList.add('visible');
    }

    function removeAudio() {
      const audio = document.getElementById('audio');
      URL.revokeObjectURL(audio.src);
      audio.src = '';
      document.getElementById('player-wrap').classList.remove('visible');
      document.getElementById('file-input').value = '';
    }
  </script>
</body>
</html>
