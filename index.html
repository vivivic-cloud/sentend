<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>sentend</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .card {
      width: 100%;
      max-width: 390px;
      border: 1px solid #111111;
      border-radius: 16px;
      padding: 24px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      border: none;
      outline: none;
      resize: none;
      font-size: 17px;
      line-height: 1.7;
      color: #111111;
      background: transparent;
      caret-color: #111111;
    }

    textarea::placeholder {
      color: #cccccc;
    }

    .divider {
      height: 1px;
      background: #eeeeee;
    }

    .mic-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: none;
      border: 1px solid #dddddd;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 14px;
      color: #888888;
      cursor: pointer;
      width: 100%;
      transition: all 0.15s;
    }

    .mic-btn.recording {
      border-color: #ff3b30;
      color: #ff3b30;
      background: #fff5f5;
    }

    .mic-btn.recording .mic-icon circle {
      fill: #ff3b30;
    }

    .status {
      font-size: 13px;
      color: #aaaaaa;
      text-align: center;
      display: none;
    }

    .status.visible {
      display: block;
    }

    .pulse {
      display: inline-block;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <textarea id="sentence" placeholder="말하면 문장이 생성됩니다"></textarea>

    <div class="divider"></div>

    <button class="mic-btn" id="mic-btn" onclick="toggleRecording()">
      <svg class="mic-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="6" y="1" width="6" height="10" rx="3" fill="#aaaaaa"/>
        <path d="M3 9a6 6 0 0012 0" stroke="#aaaaaa" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="9" y1="15" x2="9" y2="17" stroke="#aaaaaa" stroke-width="1.4" stroke-linecap="round"/>
        <circle cx="9" cy="17" r="1" fill="#aaaaaa"/>
      </svg>
      <span id="btn-text">말하기</span>
    </button>

    <div class="status" id="status"></div>
  </div>

  <script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      document.getElementById('mic-btn').disabled = true;
      document.getElementById('btn-text').textContent = '이 브라우저는 지원 안 됨';
    }

    let recognition = null;
    let isRecording = false;

    function toggleRecording() {
      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    }

    function startRecording() {
      recognition = new SpeechRecognition();
      recognition.lang = 'ko-KR';
      recognition.continuous = true;
      recognition.interimResults = true;

      const btn = document.getElementById('mic-btn');
      const btnText = document.getElementById('btn-text');
      const status = document.getElementById('status');
      const textarea = document.getElementById('sentence');

      let finalText = textarea.value;

      recognition.onstart = () => {
        isRecording = true;
        btn.classList.add('recording');
        btnText.textContent = '중지';
        status.innerHTML = '<span class="pulse">● 듣는 중...</span>';
        status.classList.add('visible');
      };

      recognition.onresult = (e) => {
        let interim = '';
        let final = '';

        for (let i = e.resultIndex; i < e.results.length; i++) {
          const transcript = e.results[i][0].transcript;
          if (e.results[i].isFinal) {
            final += transcript;
          } else {
            interim += transcript;
          }
        }

        if (final) finalText += final;
        textarea.value = finalText + interim;
      };

      recognition.onerror = (e) => {
        status.textContent = '오류: ' + e.error;
        stopRecording();
      };

      recognition.onend = () => {
        if (isRecording) recognition.start();
      };

      recognition.start();
    }

    function stopRecording() {
      isRecording = false;
      if (recognition) recognition.stop();

      const btn = document.getElementById('mic-btn');
      const btnText = document.getElementById('btn-text');
      const status = document.getElementById('status');

      btn.classList.remove('recording');
      btnText.textContent = '말하기';
      status.textContent = '완료';
      setTimeout(() => status.classList.remove('visible'), 1500);
    }
  </script>
</body>
</html>
